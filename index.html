<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Leaderboard | TNXK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Thư viện PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Thư viện hỗ trợ Font Tiếng Việt cho jsPDF (QUAN TRỌNG) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@james-p-d/roboto-font-face-buffer@1.0.0/dist/roboto-font-face.js"></script>
    <!-- File chứa font Roboto đã được convert sang Base64 để jsPDF đọc được -->
    <script src="https://cdn.jsdelivr.net/gh/MrRio/jsPDF/dist/jspdf.customfonts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dangthanh/jsPDF-Vietnamese-Fonts/dist/jspdf.customfonts.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dangthanh/jsPDF-Vietnamese-Fonts/dist/default_vfs.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --gold: #ffcf4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 50px; }

        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header { text-align: left; margin: 40px 0; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
        header h1 { 
            font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 800; line-height: 1.1; 
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-export {
            background: #fff; color: #000; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
            font-size: 14px;
        }
        .btn-export:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        .live-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 242, 255, 0.1); color: var(--primary);
            padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; margin-bottom: 10px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }

        .updated-date {
            color: #888;
            margin-top: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .updated-date i { color: var(--primary); font-size: 12px; }

        .spotlight { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
        .top-1-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; position: relative; overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column; justify-content: flex-end; min-height: 380px; transition: 0.4s;
        }
        .top-1-card:hover { border-color: var(--primary); transform: scale(1.01); }
        .top-1-score { font-size: 72px; font-weight: 800; color: var(--primary); line-height: 1; }

        .side-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; flex: 1; cursor: pointer; transition: 0.3s;
        }
        .side-card:hover { border-color: var(--primary); background: rgba(255,255,255,0.06); }
        .top-side { display: flex; flex-direction: column; gap: 20px; }

        .controls { margin-bottom: 25px; position: sticky; top: 20px; z-index: 100; }
        #searchInput {
            width: 100%; background: rgba(15,15,15,0.8); border: 1px solid var(--border);
            padding: 18px 20px 18px 55px; border-radius: 20px; color: #fff; outline: none;
            font-size: 16px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #555; }

        .row-item {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 18px 25px; border-radius: 20px; cursor: pointer;
            display: grid; grid-template-columns: 50px 1fr 100px; align-items: center;
            transition: 0.3s; margin-bottom: 12px;
        }
        .row-item:hover { transform: translateX(10px); background: rgba(255,255,255,0.06); border-color: var(--primary); }
        .row-rank { font-weight: 800; color: #444; font-size: 18px; }
        .row-score { text-align: right; font-weight: 800; color: var(--primary); font-size: 22px; }

        #detailsModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--border);
            width: 100%; max-width: 500px; border-radius: 32px;
            padding: 35px; position: relative; animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .close-btn { position: absolute; top: 25px; right: 25px; cursor: pointer; color: #555; font-size: 24px; transition: 0.3s; }
        .close-btn:hover { color: #fff; }

        .detail-list { margin-top: 25px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .detail-item { 
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 12px;
        }
        .detail-date { font-weight: 800; color: #fff; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .detail-date i { color: var(--primary); font-size: 14px; }
        
        .shift-column { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .shift-pill {
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.15);
            padding: 10px 15px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--primary);
            display: flex; align-items: center; justify-content: space-between;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .loader-circle { width: 40px; height: 40px; border: 2px solid var(--border); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .spotlight { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="loader-circle"></div></div>
<div class="mesh-bg"></div>

<div class="container">
    <header>
        <div>
            <div class="live-tag"><div class="live-dot"></div> DỮ LIỆU ĐÃ ĐỒNG BỘ</div>
            <h1>Ranking<br>TNXK.</h1>
            <p style="color: #666; margin-top: 5px;">Hệ thống ghi nhận trực Đoàn Khoa CNTT</p>
            <p id="updatedDateText" class="updated-date"><i class="fa-solid fa-calendar-check"></i> Dữ liệu đang cập nhật...</p>
        </div>
    </header>

    <div class="spotlight" id="spotlightArea"></div>

    <div class="controls">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Tìm tên hoặc MSSV...">
        </div>
    </div>

    <div class="list-container" id="listArea"></div>
</div>

<div id="detailsModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div>
        <h2 id="modalName" style="font-size: 26px; font-weight: 800;"></h2>
        <p id="modalInfo" style="color: #666; font-size: 14px; margin-top: 5px;"></p>
        <div class="detail-list" id="modalDetails"></div>
    </div>
</div>

<script>
    const SHEET_ID = "1WagQ3FSkESeaYWZurfH2XmjXKB7TdSTxa29k4-nNceM";
    const URL_DATA = `https://opensheet.elk.sh/${SHEET_ID}/KET%20QUA`;
    const REPORT_START_DATE = new Date(2025, 11, 29); // 29/12/2025

    // Chỉ lấy dữ liệu sinh viên thuộc Khoa CNTT theo các mã lớp hợp lệ bên dưới
    const VALID_CLASSES = new Set([
        "22DTH1", "22DTH2", "22DTH3", "22DTH4", "22DTH5", "22DTH6", "22DTH7",
        "23DTH1", "23DTH2", "23DTH3", "23DTH4", "23DTH5",
        "24DTH1", "24DTH2", "24DTH3", "24DPM1",
        "25DTH", "25DPM", "25DTN"
    ]);

    const TARGET_DEPARTMENT = "CNTT";

    let leaderData = [];
    let rawSheetData = [];
    let latestDataDateText = "";

    async function init() {
        try {
            const response = await fetch(URL_DATA);
            rawSheetData = await response.json();
            processAndRender(rawSheetData);
            document.getElementById("loader").style.display = "none";
        } catch (e) {
            console.error("Lỗi:", e);
        }
    }

    function normalizeClassCode(value) {
        return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, "")
            .trim();
    }

    function getValidClassCode(row) {
        const rawClass = row["Lớp"] || row["Lop"] || row["Mã lớp"] || row["Ma lop"] || row["Mã Lớp"] || "";
        const normalized = normalizeClassCode(rawClass);

        // Trường hợp dữ liệu trong sheet là mã lớp chuẩn, ví dụ: 22DTH1
        if (VALID_CLASSES.has(normalized)) return normalized;

        // Trường hợp ô lớp có thêm mô tả, ví dụ: "22DTH1 - Công nghệ thông tin"
        for (const classCode of VALID_CLASSES) {
            const reg = new RegExp(`(^|[^A-Z0-9])${classCode}([^A-Z0-9]|$)`, "i");
            if (reg.test(String(rawClass || ""))) return classCode;
        }

        return null;
    }

    function parseVNDate(dateText) {
        const raw = String(dateText || "").trim();
        const match = raw.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
        if (!match) return null;
        const day = parseInt(match[1], 10);
        const month = parseInt(match[2], 10);
        const year = parseInt(match[3].length === 2 ? `20${match[3]}` : match[3], 10);
        const date = new Date(year, month - 1, day);
        return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatVNDate(date) {
        if (!date) return "";
        return date.toLocaleDateString("vi-VN", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric"
        });
    }

    function updateLatestDataDate(data) {
        let latestDate = null;

        data.forEach(row => {
            const lopHopLe = getValidClassCode(row);
            if (!lopHopLe) return;

            const ngayDate = parseVNDate(row["Ngày"] || "");
            if (!ngayDate || ngayDate < REPORT_START_DATE) return;

            if (!latestDate || ngayDate > latestDate) {
                latestDate = ngayDate;
            }
        });

        latestDataDateText = latestDate ? formatVNDate(latestDate) : "chưa có dữ liệu";
        const updatedDateElement = document.getElementById("updatedDateText");
        if (updatedDateElement) {
            updatedDateElement.innerHTML = `<i class="fa-solid fa-calendar-check"></i> Dữ liệu cập nhật đến ngày ${latestDataDateText}`;
        }
    }

    function processAndRender(data) {
        const grouped = {};
        updateLatestDataDate(data);
        
        data.forEach(row => {
            const mssv = row["MSSV"]?.toString().trim();
            const diemDanh = row["Điểm danh"]?.toString().toLowerCase().trim();
            const ngayText = row["Ngày"] || "";
            const lopHopLe = getValidClassCode(row);
            
            if (!mssv) return;
            if (!lopHopLe) return;

            // Kiểm tra ngày có từ 29/12/2025 trở đi không
            const ngayDate = parseVNDate(ngayText);
            if (!ngayDate || ngayDate < REPORT_START_DATE) return;

            if (!grouped[mssv]) {
                grouped[mssv] = {
                    mssv: mssv,
                    name: formatName(row["Họ tên"]),
                    khoa: TARGET_DEPARTMENT,
                    lop: lopHopLe,
                    count: 0,
                    history: {}
                };
            }

            if (diemDanh === 'x' || diemDanh === '1' || diemDanh === 'v') {
                grouped[mssv].count++;
                const ngay = ngayText || "N/A";
                const ca = row["Ca"] || "N/A";
                if (!grouped[mssv].history[ngay]) grouped[mssv].history[ngay] = [];
                grouped[mssv].history[ngay].push(ca);
            }
        });

        leaderData = Object.values(grouped).filter(i => i.count > 0).sort((a, b) => b.count - a.count);
        renderUI(leaderData);
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Lấy dữ liệu đã lọc từ 29/12/2025
        const reportData = leaderData;

        // Thiết lập tiêu đề có dấu
        doc.setFont("Roboto-Regular", "bold");
        doc.setFontSize(18);
        doc.text("BÁO CÁO SINH VIÊN TRỰC TNXK - KHOA CNTT", 105, 20, { align: "center" });
        
        doc.setFontSize(11);
        doc.setFont("Roboto-Regular", "normal");
        doc.text(`Giai đoạn: 29/12/2025 - ${latestDataDateText || "Hiện tại"}`, 105, 28, { align: "center" });
        doc.text(`Ngày xuất: ${new Date().toLocaleDateString('vi-VN')}`, 105, 34, { align: "center" });

        // Xuất bảng dữ liệu
        const tableBody = reportData.map((item, index) => [
            index + 1,
            item.name,
            item.mssv,
            item.lop,
            `${item.count} ca`
        ]);

        doc.autoTable({
            startY: 45,
            head: [['STT', 'Họ tên', 'MSSV', 'Lớp', 'Tổng ca']],
            body: tableBody,
            styles: { font: "Roboto-Regular", fontStyle: "normal" },
            headStyles: { fillColor: [0, 242, 255], textColor: [0, 0, 0], fontStyle: "bold" },
            theme: 'grid'
        });

        doc.save(`Bao_Cao_Truc_TNXK_Tu_29_12_2025.pdf`);
    }

    // Các hàm render giao diện giữ nguyên...
    function renderUI(data) {
        const spotlightArea = document.getElementById("spotlightArea");
        const [top1, top2, top3] = data;

        if (!data.length) {
            spotlightArea.innerHTML = `
                <div class="top-1-card" style="min-height:220px; grid-column: 1 / -1; cursor: default;">
                    <div>
                        <div style="font-size: 26px; font-weight: 800; line-height: 1.3;">Không có dữ liệu phù hợp</div>
                        <div style="color:#888; font-size:14px; margin-top:8px">Chỉ thống kê sinh viên Khoa CNTT có mã lớp nằm trong danh sách cho phép.</div>
                    </div>
                </div>
            `;
            renderList([]);
            return;
        }

        spotlightArea.innerHTML = `
            <div class="top-1-card" onclick="showDetails('${top1?.mssv}')">
                <i class="fa-solid fa-crown" style="color:var(--gold); font-size:40px; margin-bottom:20px"></i>
                <div>
                    <div style="font-size: 32px; font-weight: 800; line-height: 1.2;">${top1?.name || "---"}</div>
                    <div style="color:#888; font-size:14px; margin-bottom:15px; margin-top:5px">${top1?.khoa || "---"}</div>
                    <div class="top-1-score">${top1?.count || 0}</div>
                    <div style="font-size:12px; font-weight:800; letter-spacing:2px; color:var(--primary)">TỔNG CA TRỰC</div>
                </div>
            </div>
            <div class="top-side">
                <div class="side-card" onclick="showDetails('${top2?.mssv}')">
                    <div style="font-size:12px; font-weight:600; color:#888; margin-bottom:5px">RANK 02</div>
                    <div style="font-size:18px; font-weight:700;">${top2?.name || "---"}</div>
                    <div style="font-size:28px; font-weight:800; margin-top:5px">${top2?.count || 0} <small style="font-size:12px;color:#666">CA</small></div>
                </div>
                <div class="side-card" onclick="showDetails('${top3?.mssv}')">
                    <div style="font-size:12px; font-weight:600; color:#888; margin-bottom:5px">RANK 03</div>
                    <div style="font-size:18px; font-weight:700;">${top3?.name || "---"}</div>
                    <div style="font-size:28px; font-weight:800; margin-top:5px">${top3?.count || 0} <small style="font-size:12px;color:#666">CA</small></div>
                </div>
            </div>
        `;
        renderList(data.slice(3));
    }

    function renderList(data) {
        const listArea = document.getElementById("listArea");
        listArea.innerHTML = data.map((item, i) => `
            <div class="row-item" onclick="showDetails('${item.mssv}')">
                <div class="row-rank">${i + 4}</div>
                <div>
                    <div class="row-name" style="font-weight:600; color:#eee;">${item.name}</div>
                    <div style="font-size:12px; color:#555; margin-top:2px;">${item.mssv} • ${item.lop}</div>
                </div>
                <div class="row-score">${item.count}</div>
            </div>
        `).join('');
    }

    function showDetails(mssv) {
        const person = leaderData.find(p => p.mssv === mssv);
        if (!person) return;
        document.getElementById("modalName").innerText = person.name;
        document.getElementById("modalInfo").innerText = `${person.mssv} • ${person.lop}`;
        const detailsContainer = document.getElementById("modalDetails");
        detailsContainer.innerHTML = Object.entries(person.history).map(([date, shifts]) => `
            <div class="detail-item">
                <div class="detail-date"><i class="fa-solid fa-calendar-day"></i> ${date}</div>
                <div class="shift-column">${shifts.map(ca => `<div class="shift-pill">${ca}</div>`).join('')}</div>
            </div>
        `).join('');
        document.getElementById("detailsModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("detailsModal").style.display = "none"; }

    document.getElementById("searchInput").oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = leaderData.filter(i => i.name.toLowerCase().includes(val) || i.mssv.includes(val));
        renderList(filtered.length > 3 ? filtered.slice(3) : filtered);
    };

    function formatName(s) {
        if (!s) return "N/A";
        return s.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    init();
</script>
</body>
</html>
