<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Leaderboard | TNXK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --gold: #ffcf4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 50px; }

        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header { text-align: left; margin: 40px 0; }
        header h1 { 
            font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 800; line-height: 1.1; 
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .live-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 242, 255, 0.1); color: var(--primary);
            padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; margin-bottom: 10px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* Spotlight Layout */
        .spotlight { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
        .top-1-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; position: relative; overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column; justify-content: flex-end; min-height: 380px; transition: 0.4s;
        }
        .top-1-card:hover { border-color: var(--primary); transform: scale(1.01); }
        .top-1-card::before {
            content: "01"; position: absolute; top: -20px; right: -10px;
            font-size: 200px; font-weight: 800; opacity: 0.05; color: var(--gold);
        }
        .top-1-score { font-size: 72px; font-weight: 800; color: var(--primary); line-height: 1; }

        .side-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; flex: 1; cursor: pointer; transition: 0.3s;
        }
        .side-card:hover { border-color: var(--primary); background: rgba(255,255,255,0.06); }
        .top-side { display: flex; flex-direction: column; gap: 20px; }

        /* Search & List */
        .controls { margin-bottom: 25px; position: sticky; top: 20px; z-index: 100; }
        #searchInput {
            width: 100%; background: rgba(15,15,15,0.8); border: 1px solid var(--border);
            padding: 18px 20px 18px 55px; border-radius: 20px; color: #fff; outline: none;
            font-size: 16px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #555; }

        .row-item {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 18px 25px; border-radius: 20px; cursor: pointer;
            display: grid; grid-template-columns: 50px 1fr 100px; align-items: center;
            transition: 0.3s; margin-bottom: 12px;
        }
        .row-item:hover { transform: translateX(10px); background: rgba(255,255,255,0.06); border-color: var(--primary); }
        .row-rank { font-weight: 800; color: #444; font-size: 18px; }
        .row-score { text-align: right; font-weight: 800; color: var(--primary); font-size: 22px; }

        /* Modal */
        #detailsModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--border);
            width: 100%; max-width: 500px; border-radius: 32px;
            padding: 35px; position: relative; animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .close-btn { position: absolute; top: 25px; right: 25px; cursor: pointer; color: #555; font-size: 24px; transition: 0.3s; }
        .close-btn:hover { color: #fff; }

        /* DANH SÁCH CHI TIẾT (Cập nhật dạng cột) */
        .detail-list { margin-top: 25px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .detail-item { 
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 12px;
        }
        .detail-date { font-weight: 800; color: #fff; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .detail-date i { color: var(--primary); font-size: 14px; }
        
        .shift-column {
            display: flex; flex-direction: column; gap: 8px; width: 100%;
        }
        .shift-pill {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.15);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .shift-pill::before {
            content: "•"; margin-right: 8px; opacity: 0.5;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .loader-circle { width: 40px; height: 40px; border: 2px solid var(--border); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .spotlight { grid-template-columns: 1fr; }
            .top-1-card { min-height: 300px; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="loader-circle"></div></div>
<div class="mesh-bg"></div>

<div class="container">
    <header>
        <div class="live-tag"><div class="live-dot"></div> DỮ LIỆU ĐÃ ĐỒNG BỘ</div>
        <h1>Ranking<br>TNXK.</h1>
        <p style="color: #666; margin-left: 5px;">Hệ thống ghi nhận trực Đoàn Khoa CNTT-TT</p>
    </header>

    <div class="spotlight" id="spotlightArea"></div>

    <div class="controls">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Tìm tên hoặc MSSV...">
        </div>
    </div>

    <div class="list-container" id="listArea"></div>
</div>

<div id="detailsModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div>
        <h2 id="modalName" style="font-size: 26px; font-weight: 800;"></h2>
        <p id="modalInfo" style="color: #666; font-size: 14px; margin-top: 5px;"></p>
        <div class="detail-list" id="modalDetails"></div>
    </div>
</div>

<script>
    const SHEET_ID = "1WagQ3FSkESeaYWZurfH2XmjXKB7TdSTxa29k4-nNceM";
    const URL_DATA = `https://opensheet.elk.sh/${SHEET_ID}/KET%20QUA`;

    let leaderData = [];

    async function init() {
    try {
        const response = await fetch(URL_DATA);
        const rawData = await response.json();
        const grouped = {};

        rawData.forEach(row => {
            const mssv = row["MSSV"]?.toString().trim();
            const diemDanh = row["Điểm danh"]?.toString().toLowerCase().trim();

            if (!mssv) return;

            // 🔥 Tạo trước nếu chưa có
            if (!grouped[mssv]) {
                grouped[mssv] = {
                    mssv: mssv,
                    name: formatName(row["Họ tên"]),
                    khoa: row["Khoa"],
                    lop: row["Lớp"],
                    count: 0,
                    history: {}
                };
            }

            // ✅ Chỉ đếm khi hợp lệ
            if (diemDanh === 'x' || diemDanh === '1' || diemDanh === 'v') {
                grouped[mssv].count++;

                const ngay = row["Ngày"] || "N/A";
                const ca = row["Ca"] || "N/A";

                if (!grouped[mssv].history[ngay]) {
                    grouped[mssv].history[ngay] = [];
                }

                grouped[mssv].history[ngay].push(ca);
            }
        });

        leaderData = Object.values(grouped)
            .filter(i => i.count > 0) // 🔥 lọc người có trực
            .sort((a, b) => b.count - a.count);

        renderUI(leaderData);
        document.getElementById("loader").style.display = "none";

    } catch (e) {
        console.error("Lỗi:", e);
    }
}
    function renderUI(data) {
        const spotlightArea = document.getElementById("spotlightArea");
        const [top1, top2, top3] = data;

        spotlightArea.innerHTML = `
            <div class="top-1-card" onclick="showDetails('${top1?.mssv}')">
                <i class="fa-solid fa-crown" style="color:var(--gold); font-size:40px; margin-bottom:20px"></i>
                <div>
                    <div style="font-size: 32px; font-weight: 800; line-height: 1.2;">${top1?.name || "---"}</div>
                    <div style="color:#888; font-size:14px; margin-bottom:15px; margin-top:5px">${top1?.khoa || "---"}</div>
                    <div class="top-1-score">${top1?.count || 0}</div>
                    <div style="font-size:12px; font-weight:800; letter-spacing:2px; color:var(--primary)">TỔNG CA TRỰC</div>
                </div>
            </div>
            <div class="top-side">
                <div class="side-card" onclick="showDetails('${top2?.mssv}')">
                    <div style="font-size:12px; font-weight:600; color:#888; margin-bottom:5px">RANK 02</div>
                    <div style="font-size:18px; font-weight:700;">${top2?.name || "---"}</div>
                    <div style="font-size:28px; font-weight:800; margin-top:5px">${top2?.count || 0} <small style="font-size:12px;color:#666">CA</small></div>
                </div>
                <div class="side-card" onclick="showDetails('${top3?.mssv}')">
                    <div style="font-size:12px; font-weight:600; color:#888; margin-bottom:5px">RANK 03</div>
                    <div style="font-size:18px; font-weight:700;">${top3?.name || "---"}</div>
                    <div style="font-size:28px; font-weight:800; margin-top:5px">${top3?.count || 0} <small style="font-size:12px;color:#666">CA</small></div>
                </div>
            </div>
        `;
        renderList(data.slice(3));
    }

    function renderList(data) {
        const listArea = document.getElementById("listArea");
        listArea.innerHTML = data.map((item, i) => `
            <div class="row-item" onclick="showDetails('${item.mssv}')">
                <div class="row-rank">${i + 4}</div>
                <div>
                    <div class="row-name" style="font-weight:600; color:#eee;">${item.name}</div>
                    <div style="font-size:12px; color:#555; margin-top:2px;">${item.mssv} • ${item.lop}</div>
                </div>
                <div class="row-score">${item.count}</div>
            </div>
        `).join('');
    }

    // Cập nhật hàm hiển thị chi tiết (Dạng cột)
    function showDetails(mssv) {
        const person = leaderData.find(p => p.mssv === mssv);
        if (!person) return;

        document.getElementById("modalName").innerText = person.name;
        document.getElementById("modalInfo").innerText = `${person.mssv} • ${person.lop}`;
        
        const detailsContainer = document.getElementById("modalDetails");
        
        // Render lịch sử trực theo cột dọc
        detailsContainer.innerHTML = Object.entries(person.history).map(([date, shifts]) => `
            <div class="detail-item">
                <div class="detail-date">
                    <i class="fa-solid fa-calendar-day"></i> ${date}
                </div>
                <div class="shift-column">
                    ${shifts.map(ca => `<div class="shift-pill">${ca}</div>`).join('')}
                </div>
            </div>
        `).join('');

        document.getElementById("detailsModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("detailsModal").style.display = "none";
    }

    document.getElementById("searchInput").oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = leaderData.filter(i => 
            i.name.toLowerCase().includes(val) || i.mssv.includes(val)
        );
        renderList(filtered.length > 3 ? filtered.slice(3) : filtered);
    };

    function formatName(s) {
        if (!s) return "N/A";
        return s.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    init();
</script>
</body>
</html>
